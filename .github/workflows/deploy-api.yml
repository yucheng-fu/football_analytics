name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
      - "src/utils/**"
      - "Dockerfile"
      - "README.md"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_SPACE_REPO_ID }}
        run: |
          # The Repo ID secret should be in the format: username/space-name
          git remote add hf "https://n:$HF_TOKEN@huggingface.co/spaces/$HF_REPO"
          
          # Force push the main branch to the HF remote
          git push --force hf main