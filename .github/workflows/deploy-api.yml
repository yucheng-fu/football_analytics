name: Deploy API to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
      - "src/utils/**"
      - "Dockerfile"
      - "README.md"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Hugging Face Space repo
        run: |
          rm -rf hf-space
          git clone https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_SPACE_REPO_ID }} hf-space
          git -C hf-space remote rename origin hf

      - name: Sync files to Space repo
        run: |
          rsync -av --delete \
            Dockerfile README.md src/ hf-space/

      - name: Commit and push to HF
        working-directory: hf-space
        run: |
          set -euo pipefail
          set -x
          test -d .git
          git rev-parse --show-toplevel
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git remote -v
          git checkout -B main
          git add .
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Deploy update from GitHub Actions"
          git push hf main --force
