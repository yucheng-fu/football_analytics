name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
      - "src/model/**"
      - "src/feature_engineering/**"
      - "src/utils/inference_utils.py"
      - "src/utils/statics.py"
      - "pyproject.toml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Prepare and Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_SPACE_REPO_ID }}
        run: |
          # 1. Create a temporary deployment directory with the src structure
          mkdir -p deploy_dir/src
          mkdir -p deploy_dir/src/utils
          
          # 2. Copy the folders into the NEW src directory
          cp -r src/api deploy_dir/src/
          cp -r src/model deploy_dir/src/
          cp -r src/feature_engineering deploy_dir/src/
          cp -r src/utils/inference_utils.py deploy_dir/src/utils/
          cp -r src/utils/statics.py deploy_dir/src/utils/
          # 3. Copy docker file and README (Dockerfile and config files)
          cp src/api/Dockerfile deploy_dir/
          cp src/api/README.md deploy_dir/
          
          # IMPORTANT: If you have a pyproject.toml, setup.py, or requirements.txt, 
          # you MUST copy them so pip knows how to install your app.
          [ -f pyproject.toml ] && cp pyproject.toml deploy_dir/
          [ -f setup.py ] && cp setup.py deploy_dir/
          [ -f requirements.txt ] && cp requirements.txt deploy_dir/

          # 4. Initialize and Push
          cd deploy_dir
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git lfs install
          git lfs track "*.pkl"
          git lfs track "*.parquet"
          
          git add .
          git commit -m "Deploying with correct src structure"
          git remote add hf "https://n:$HF_TOKEN@huggingface.co/spaces/$HF_REPO"
          git push --force hf main