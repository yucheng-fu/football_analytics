name: Deploy API to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
      - "src/utils/**"
      - "Dockerfile"
      - "README.md"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone Hugging Face Space repo
        run: |
          git clone https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_SPACE_REPO_ID }} hf-space

      - name: Sync files to Space repo
        run: |
          rsync -av --delete \
            Dockerfile README.md src/ hf-space/

      - name: Commit and push to HF
        working-directory: hf-space
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Deploy update from GitHub Actions"
          git push --force https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_SPACE_REPO_ID }} HEAD:main
